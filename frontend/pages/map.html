  <main id="main-content" class="map-layout">
    <aside class="map-filters">
      <div class="map-filters__header">
        <h2>Mapa de Empleos</h2>
        <button class="btn btn--primary btn--sm" id="btnLocation" title="Buscar cerca de mí">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" /></svg>
          Cerca de mí
        </button>
      </div>

      <div class="form-group">
        <label class="form-label" for="filterDistance">Distancia: <span id="distanceValue">5km</span></label>
        <input type="range" id="filterDistance" min="500" max="15000" step="500" value="5000" class="form-range">
      </div>

      <div class="form-group">
        <label class="form-label" for="filterBarrio">Barrio / Zona</label>
        <select id="filterBarrio" class="form-input">
          <option value="all">Todos los barrios</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="filterCategory">Categoría</label>
        <select id="filterCategory" class="form-input">
          <option value="all">Todas las categorías</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="filterModality">Modalidad</label>
        <select id="filterModality" class="form-input">
          <option value="all">Cualquier modalidad</option>
          <option value="Presencial">Presencial</option>
          <option value="Híbrido">Híbrido</option>
          <option value="Remoto">Remoto</option>
        </select>
      </div>
      
      <div class="map-filters__footer" id="jobCountIndicator">
        Cargando ofertas...
      </div>
    </aside>

    <div class="map-container">
      <div id="map"></div>
    </div>
  </main>
