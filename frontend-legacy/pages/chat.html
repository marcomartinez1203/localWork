<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#007200">
  <link rel="icon" type="image/png" href="../assets/img/favicon.png">
  <meta name="description" content="Chat directo entre candidato y empleador en LocalWork">
  <title>Chat — LocalWork</title>
  <script src="../assets/js/theme-init.js"></script>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <style>
    .chat-page { height: calc(100vh - 110px); min-height: 620px; padding: var(--space-4) 0 var(--space-8); }
    .chat-shell { height: 100%; display: grid; grid-template-columns: 340px 1fr; gap: var(--space-3); }
    .chat-card { background: var(--color-surface); border: 1px solid var(--color-border-light); border-radius: var(--radius-2xl); overflow: hidden; }
    .chat-sidebar { display: flex; flex-direction: column; }
    .chat-sidebar__header { padding: var(--space-4); border-bottom: 1px solid var(--color-border-light); }
    .chat-sidebar__title { margin: 0; font-size: var(--fs-lg); }
    .chat-sidebar__list { overflow-y: auto; padding: var(--space-2); display: flex; flex-direction: column; gap: var(--space-2); }
    .chat-item { border: 1px solid transparent; border-radius: var(--radius-lg); padding: var(--space-3); display: flex; gap: var(--space-3); cursor: pointer; transition: all var(--transition); }
    .chat-item:hover { background: var(--color-bg); border-color: var(--color-border-light); }
    .chat-item.active { background: var(--color-primary-50); border-color: var(--color-primary-200); }
    .chat-item__avatar { width: 42px; height: 42px; border-radius: var(--radius-full); background: var(--color-primary-100); color: var(--color-primary); font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .chat-item__avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-item__body { min-width: 0; flex: 1; }
    .chat-item__top { display: flex; justify-content: space-between; gap: var(--space-2); }
    .chat-item__name { margin: 0; font-size: var(--fs-sm); font-weight: var(--fw-semibold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item__time { font-size: 11px; color: var(--color-text-muted); font-family: var(--font-mono); }
    .chat-item__bottom { display: flex; justify-content: space-between; align-items: center; gap: var(--space-2); margin-top: 2px; }
    .chat-item__last { margin: 0; font-size: var(--fs-xs); color: var(--color-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item__badge { min-width: 20px; height: 20px; border-radius: var(--radius-full); background: var(--color-primary); color: #fff; font-family: var(--font-mono); font-size: 11px; display: flex; align-items: center; justify-content: center; padding: 0 6px; }

    .chat-main { display: flex; flex-direction: column; height: 100%; }
    .chat-main__header { border-bottom: 1px solid var(--color-border-light); padding: var(--space-4); display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); }
    .chat-main__user { display: flex; align-items: center; gap: var(--space-3); }
    .chat-main__user h2 { margin: 0; font-size: var(--fs-base); }
    .chat-main__meta { font-size: 12px; color: var(--color-text-muted); margin-top: 2px; display: flex; align-items: center; gap: var(--space-2); }
    .chat-main__meta-dot { width: 7px; height: 7px; border-radius: var(--radius-full); background: #16a34a; }
    .chat-main__messages { flex: 1; overflow-y: auto; padding: var(--space-4); background: var(--color-bg); }
    .chat-date-sep { text-align: center; font-size: 11px; color: var(--color-text-muted); margin: var(--space-3) 0; text-transform: uppercase; letter-spacing: .05em; }
    .chat-bubble-wrap { display: flex; margin-bottom: var(--space-2); }
    .chat-bubble-wrap.mine { justify-content: flex-end; }
    .chat-bubble { max-width: min(78%, 620px); border-radius: var(--radius-lg); padding: var(--space-2) var(--space-3); background: #1f2937; color: #f9fafb; border: 1px solid transparent; }
    .chat-bubble-wrap.mine .chat-bubble { background: #007200; color: #fff; }
    .chat-bubble__text { margin: 0; white-space: pre-wrap; word-break: break-word; font-size: var(--fs-sm); }
    .chat-bubble__attachment { margin-top: var(--space-2); display: inline-flex; gap: var(--space-2); align-items: center; font-size: var(--fs-xs); color: inherit; text-decoration: underline; }
    .chat-bubble__time { margin-top: 2px; font-size: 10px; opacity: .8; text-align: right; font-family: var(--font-mono); }
    .chat-main__composer { border-top: 1px solid var(--color-border-light); padding: var(--space-3); display: flex; align-items: flex-end; gap: var(--space-2); }
    .chat-main__composer textarea { resize: none; min-height: 42px; max-height: 130px; }
    .chat-empty { height: 100%; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); text-align: center; padding: var(--space-8); }
    .chat-attachment-chip { font-size: 11px; color: var(--color-text-muted); padding: 2px 8px; border-radius: var(--radius-full); border: 1px dashed var(--color-border); margin-bottom: var(--space-2); display: none; }
    @media (max-width: 980px) { .chat-shell { grid-template-columns: 1fr; } .chat-page { height: auto; min-height: auto; } .chat-sidebar { max-height: 300px; } }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Ir al contenido principal</a>
  <nav class="navbar navbar--sidebar" id="navbar">
    <div class="navbar__inner">
      <a href="../index.html" class="navbar__brand"><span class="navbar__brand-icon">LW</span> <span class="navbar__brand-text">LocalWork</span></a>
      <div class="navbar__links">
        <a href="home.html" class="navbar__link"><span class="navbar__link-text">Inicio</span></a>
        <a href="chat.html" class="navbar__link active"><span class="navbar__link-text">Chat</span></a>
        <a href="notifications.html" class="navbar__link"><span class="navbar__link-text">Notificaciones</span></a>
      </div>
      <div class="navbar__actions">
        <div class="navbar__avatar" id="userAvatar" onclick="App.toggleUserMenu()" tabindex="0">??</div>
        <button class="navbar__hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
      </div>
    </div>
    <div class="navbar__mobile-menu" id="mobileMenu"></div>
  </nav>

  <main id="main-content" class="page-wrapper">
    <div class="container chat-page">
      <div class="chat-shell">
        <aside class="chat-card chat-sidebar">
          <div class="chat-sidebar__header"><h1 class="chat-sidebar__title">Conversaciones</h1></div>
          <div id="incomingRequests" style="padding:var(--space-2) var(--space-2) 0;"></div>
          <div class="chat-sidebar__list" id="conversationList"></div>
        </aside>

        <section class="chat-card chat-main">
          <header class="chat-main__header">
            <div class="chat-main__user">
              <div class="chat-item__avatar" id="activeAvatar">--</div>
              <div>
                <h2 id="activeName">Selecciona una conversación</h2>
                <div class="chat-main__meta" id="activeMeta"></div>
              </div>
            </div>
          </header>
          <div class="chat-main__messages" id="messagesPanel">
            <div class="chat-empty">Selecciona una conversación para comenzar.</div>
          </div>
          <form class="chat-main__composer" id="composerForm">
            <input type="file" id="attachmentInput" style="display:none;" />
            <button class="btn btn--ghost btn--sm" type="button" id="attachBtn">Adjuntar</button>
            <div style="flex:1;min-width:0;">
              <div class="chat-attachment-chip" id="attachmentChip"></div>
              <textarea class="form-textarea" id="messageInput" maxlength="500" placeholder="Escribe un mensaje..."></textarea>
            </div>
            <button class="btn btn--primary btn--sm" type="submit" id="sendBtn">Enviar</button>
          </form>
        </section>
      </div>
    </div>
  </main>

  <script src="../assets/js/config/api.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../assets/js/services/auth.service.js"></script>
  <script src="../assets/js/services/notifications.service.js"></script>
  <script src="../assets/js/services/chat.service.js"></script>
  <script src="../assets/js/utils/helpers.js"></script>
  <script src="../assets/js/app.js"></script>
  <script>
    if (!AuthService.requireAuth()) { /* redirects */ }

    const state = {
      user: AuthService.getUser(),
      conversations: [],
      activeConversationId: new URLSearchParams(window.location.search).get('conversation_id') || null,
      selectedAttachment: null,
      incomingRequests: [],
      supabase: null,
      messageChannel: null,
      presenceChannel: null,
      knownMessageIds: new Set(),
    };

    if (state.user?.full_name) {
      const initials = state.user.full_name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
    }

    function fmtTime(value) {
      if (!value) return '';
      const d = new Date(value);
      return d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
    }

    function dayKey(value) {
      const d = new Date(value);
      return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    }

    function dayLabel(value) {
      const d = new Date(value);
      return d.toLocaleDateString('es-CO', { weekday: 'short', day: '2-digit', month: 'short' });
    }

    function initials(name) {
      return (name || 'U').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
    }

    function getActiveConversation() {
      return state.conversations.find(c => c.id === state.activeConversationId) || null;
    }

    async function initRealtime() {
      const token = sessionStorage.getItem('lw_token');
      if (!token || !window.supabase) return;
      state.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
        global: { headers: { Authorization: `Bearer ${token}` } },
      });
    }

    function renderConversationList() {
      const list = document.getElementById('conversationList');
      if (!state.conversations.length) {
        list.innerHTML = '<div class="chat-empty">Aun no tienes conversaciones activas.</div>';
        return;
      }

      list.innerHTML = state.conversations.map(c => {
        const lastText = c.last_message
          ? (c.last_message.content || `Adjunto: ${c.last_message.attachment_name || 'archivo'}`)
          : (c.kind === 'application'
            ? `Postulacion: ${c.application ? c.application.job_title : 'Oferta'}`
            : 'Chat directo');
        const avatar = c.other_user.avatar_url
          ? `<img src="${c.other_user.avatar_url}" alt="${escapeHtml(c.other_user.full_name)}">`
          : initials(c.other_user.full_name);
        return `
          <article class="chat-item ${state.activeConversationId === c.id ? 'active' : ''}" onclick="openConversation('${c.id}')">
            <div class="chat-item__avatar">${avatar}</div>
            <div class="chat-item__body">
              <div class="chat-item__top">
                <h3 class="chat-item__name">${escapeHtml(c.other_user.full_name)}</h3>
                <span class="chat-item__time">${fmtTime(c.last_message_at || c.created_at)}</span>
              </div>
              <div class="chat-item__bottom">
                <p class="chat-item__last">${escapeHtml(lastText)}</p>
                ${c.unread_count > 0 ? `<span class="chat-item__badge">${c.unread_count}</span>` : ''}
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderIncomingRequests() {
      const el = document.getElementById('incomingRequests');
      if (!state.incomingRequests.length) {
        el.innerHTML = '';
        return;
      }
      el.innerHTML = `
        <div style="border:1px solid var(--color-border-light);border-radius:var(--radius);padding:var(--space-2);display:flex;flex-direction:column;gap:var(--space-2);">
          <p style="margin:0;font-size:12px;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.04em;">Solicitudes pendientes</p>
          ${state.incomingRequests.map(r => `
            <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);">
              <span style="font-size:var(--fs-sm);">${escapeHtml(r.sender.full_name)}</span>
              <div style="display:flex;gap:6px;">
                <button class="btn btn--sm" style="padding:4px 8px;background:#007200;border-color:#007200;color:#fff;" onclick="respondRequest('${r.id}','accepted')">Aceptar</button>
                <button class="btn btn--ghost btn--sm" style="padding:4px 8px;" onclick="respondRequest('${r.id}','rejected')">Rechazar</button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderActiveHeader(conversation, online) {
      const avatarEl = document.getElementById('activeAvatar');
      if (conversation.other_user.avatar_url) {
        avatarEl.innerHTML = `<img src="${conversation.other_user.avatar_url}" alt="${escapeHtml(conversation.other_user.full_name)}">`;
      } else {
        avatarEl.textContent = initials(conversation.other_user.full_name);
      }
      document.getElementById('activeName').textContent = conversation.other_user.full_name;
      document.getElementById('activeMeta').innerHTML = online
        ? `<span class="chat-main__meta-dot"></span><span>En linea</span>`
        : `<span>${conversation.kind === 'application'
          ? `Oferta: ${escapeHtml(conversation.application ? conversation.application.job_title : 'Oferta')}`
          : 'Chat directo'}</span>`;
    }

    function renderMessages(messages) {
      const panel = document.getElementById('messagesPanel');
      if (!messages.length) {
        panel.innerHTML = '<div class="chat-empty">Aun no hay mensajes. Escribe el primero.</div>';
        return;
      }

      let html = '';
      let lastDay = '';
      messages.forEach(message => {
        const currentDay = dayKey(message.created_at);
        if (currentDay !== lastDay) {
          html += `<div class="chat-date-sep">${dayLabel(message.created_at)}</div>`;
          lastDay = currentDay;
        }
        const mine = message.sender_id === state.user.id;
        const content = message.content ? `<p class="chat-bubble__text">${escapeHtml(message.content)}</p>` : '';
        const attachment = message.attachment_url
          ? `<a class="chat-bubble__attachment" href="${message.attachment_url}" target="_blank" rel="noopener">
              <span>Adjunto:</span><span>${escapeHtml(message.attachment_name || 'archivo')}</span>
             </a>`
          : '';
        html += `
          <div class="chat-bubble-wrap ${mine ? 'mine' : ''}">
            <div class="chat-bubble">
              ${content}
              ${attachment}
              <div class="chat-bubble__time">${fmtTime(message.created_at)}</div>
            </div>
          </div>
        `;
      });
      panel.innerHTML = html;
      panel.scrollTop = panel.scrollHeight;
    }

    async function loadConversations() {
      const result = await ChatService.listConversations();
      state.conversations = result.data || [];
      const incoming = await ChatService.getIncomingRequests();
      state.incomingRequests = incoming.data || [];
      renderIncomingRequests();
      if (!state.activeConversationId && state.conversations.length) {
        state.activeConversationId = state.conversations[0].id;
      }
      if (state.activeConversationId && !state.conversations.some(c => c.id === state.activeConversationId)) {
        state.activeConversationId = state.conversations.length ? state.conversations[0].id : null;
      }
      renderConversationList();
      if (state.activeConversationId) {
        await openConversation(state.activeConversationId, { skipListReload: true });
      }
    }

    async function openConversation(conversationId, opts = {}) {
      state.activeConversationId = conversationId;
      renderConversationList();

      const conversation = getActiveConversation();
      if (!conversation) return;

      const messagesResult = await ChatService.getMessages(conversationId, { page: 1, perPage: 200 });
      const messages = messagesResult.data || [];
      messages.forEach(m => state.knownMessageIds.add(m.id));
      renderActiveHeader(conversation, false);
      renderMessages(messages);
      await ChatService.markAsRead(conversationId);
      conversation.unread_count = 0;
      renderConversationList();

      if (!opts.skipListReload) {
        window.history.replaceState({}, '', `chat.html?conversation_id=${conversationId}`);
      }

      subscribeToMessages(conversationId);
      subscribeToPresence(conversation);
      if (typeof App.checkChatUnread === 'function') App.checkChatUnread();
    }

    function subscribeToMessages(conversationId) {
      if (!state.supabase) return;
      if (state.messageChannel) {
        state.supabase.removeChannel(state.messageChannel);
      }
      state.messageChannel = state.supabase
        .channel(`messages:${conversationId}`)
        .on('postgres_changes', {
          event: 'INSERT',
          schema: 'public',
          table: 'messages',
          filter: `conversation_id=eq.${conversationId}`,
        }, async (payload) => {
          const msg = payload.new;
          if (state.knownMessageIds.has(msg.id)) return;
          state.knownMessageIds.add(msg.id);

          const isMine = msg.sender_id === state.user.id;
          const isFocused = document.visibilityState === 'visible' && document.hasFocus();
          const active = state.activeConversationId === conversationId;
          if (active) {
            const result = await ChatService.getMessages(conversationId, { page: 1, perPage: 200 });
            renderMessages(result.data || []);
            if (!isMine && isFocused) {
              await ChatService.markAsRead(conversationId);
            }
            if (!isMine) playBeep();
          }
          await loadConversations();
        })
        .subscribe();
    }

    function subscribeToPresence(conversation) {
      if (!state.supabase) return;
      if (state.presenceChannel) {
        state.supabase.removeChannel(state.presenceChannel);
      }

      const channelName = `presence:conversation:${conversation.id}`;
      state.presenceChannel = state.supabase.channel(channelName, {
        config: { presence: { key: state.user.id } },
      });

      const syncPresence = () => {
        const presenceState = state.presenceChannel.presenceState();
        const otherId = conversation.other_user.id;
        const online = Boolean(presenceState[otherId]?.length);
        renderActiveHeader(conversation, online);
      };

      state.presenceChannel
        .on('presence', { event: 'sync' }, syncPresence)
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await state.presenceChannel.track({
              user_id: state.user.id,
              at: new Date().toISOString(),
            });
          }
        });
    }

    async function sendMessage(event) {
      event.preventDefault();
      const conversation = getActiveConversation();
      if (!conversation) {
        showToast('Selecciona una conversación', 'info');
        return;
      }

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.classList.add('btn--loading');
      try {
        const text = document.getElementById('messageInput').value.trim();
        const file = state.selectedAttachment;
        let attachmentPayload = {};
        if (file) {
          const upload = await ChatService.uploadAttachment(file);
          attachmentPayload = upload;
        }
        await ChatService.sendMessage(conversation.id, {
          content: text,
          ...attachmentPayload,
        });
        document.getElementById('messageInput').value = '';
        state.selectedAttachment = null;
        renderAttachmentChip();
      } catch (err) {
        showToast(err.message || 'No se pudo enviar el mensaje', 'error');
      } finally {
        sendBtn.disabled = false;
        sendBtn.classList.remove('btn--loading');
      }
    }

    async function respondRequest(requestId, action) {
      try {
        const result = await ChatService.respondRequest(requestId, action);
        if (result.conversation_id) {
          state.activeConversationId = result.conversation_id;
        }
        await loadConversations();
      } catch (err) {
        showToast(err.message || 'No se pudo responder la solicitud', 'error');
      }
    }

    function renderAttachmentChip() {
      const chip = document.getElementById('attachmentChip');
      if (!state.selectedAttachment) {
        chip.style.display = 'none';
        chip.textContent = '';
        return;
      }
      chip.style.display = 'inline-flex';
      chip.textContent = `Adjunto: ${state.selectedAttachment.name}`;
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(640, ctx.currentTime);
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.06, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.14);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
      } catch (_err) {
        // Silencioso
      }
    }

    document.getElementById('composerForm').addEventListener('submit', sendMessage);
    document.getElementById('attachBtn').addEventListener('click', () => {
      document.getElementById('attachmentInput').click();
    });
    document.getElementById('attachmentInput').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0] ? e.target.files[0] : null;
      state.selectedAttachment = file;
      renderAttachmentChip();
    });
    document.getElementById('messageInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('composerForm').requestSubmit();
      }
    });

    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && state.activeConversationId) {
        await ChatService.markAsRead(state.activeConversationId);
        if (typeof App.checkChatUnread === 'function') App.checkChatUnread();
      }
    });

    (async function init() {
      try {
        await initRealtime();
        await loadConversations();
      } catch (err) {
        document.getElementById('conversationList').innerHTML = `<div class="chat-empty">${escapeHtml(err.message || 'Error al cargar conversaciones')}</div>`;
      }
    })();
  </script>
</body>
</html>
